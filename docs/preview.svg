<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Price Paths preview</title>
  <desc id="desc">Preview artwork for Price Paths, a local-first board for price paths.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1020" />
      <stop offset="100%" stop-color="#050911" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#facc15" />
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)" />
  <rect x="36" y="32" width="888" height="84" rx="24" fill="#1a1108" stroke="#6d4b1f" />
  <text x="66" y="72" font-family="Inter, Arial, sans-serif" font-size="28" fill="#eef2ff">Price Paths</text>
  <text x="66" y="96" font-family="Inter, Arial, sans-serif" font-size="14" fill="#b7c0d9">Sketch pricing experiments and compare which paths feel strongest.</text>

  <rect x="36" y="138" width="888" height="118" rx="28" fill="#1a1108" stroke="#6d4b1f" />
  <rect x="62" y="164" width="184" height="68" rx="18" fill="rgba(255,255,255,0.04)" stroke="#6d4b1f" />
  <rect x="264" y="164" width="184" height="68" rx="18" fill="rgba(255,255,255,0.04)" stroke="#6d4b1f" />
  <rect x="466" y="164" width="184" height="68" rx="18" fill="rgba(255,255,255,0.04)" stroke="#6d4b1f" />
  <rect x="668" y="164" width="230" height="68" rx="18" fill="rgba(255,255,255,0.04)" stroke="#6d4b1f" />
  <text x="84" y="189" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">Price paths</text>
  <text x="84" y="220" font-family="Inter, Arial, sans-serif" font-size="26" fill="#eef2ff">8</text>
  <text x="286" y="189" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">Confidence</text>
  <text x="286" y="220" font-family="Inter, Arial, sans-serif" font-size="26" fill="#eef2ff">7.4</text>
  <text x="488" y="189" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">Next review</text>
  <text x="488" y="220" font-family="Inter, Arial, sans-serif" font-size="26" fill="#eef2ff">04-26</text>
  <text x="690" y="189" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">Top state</text>
  <text x="690" y="220" font-family="Inter, Arial, sans-serif" font-size="26" fill="#eef2ff">Testing</text>

  <rect x="36" y="278" width="522" height="226" rx="28" fill="#1a1108" stroke="#6d4b1f" />
  <text x="62" y="314" font-family="Inter, Arial, sans-serif" font-size="18" fill="#eef2ff">What to pressure-test next</text>
  <text x="62" y="336" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">Visible risk, dates, and confidence in one clean queue.</text>
  <rect x="62" y="356" width="470" height="54" rx="18" fill="rgba(255,255,255,0.04)" stroke="#6d4b1f" />
  <text x="84" y="388" font-family="Inter, Arial, sans-serif" font-size="16" fill="#eef2ff">Low-friction pilot</text>
  <text x="310" y="388" font-family="Inter, Arial, sans-serif" font-size="12" fill="#d5deff">First-time buyer · 7/10</text>
  <rect x="62" y="422" width="470" height="54" rx="18" fill="rgba(255,255,255,0.04)" stroke="#6d4b1f" />
  <text x="84" y="454" font-family="Inter, Arial, sans-serif" font-size="16" fill="#eef2ff">Core monthly retainer</text>
  <text x="310" y="454" font-family="Inter, Arial, sans-serif" font-size="12" fill="#d5deff">Scope creep risk · Exploring</text>

  <rect x="584" y="278" width="340" height="226" rx="28" fill="#1a1108" stroke="#6d4b1f" />
  <text x="610" y="314" font-family="Inter, Arial, sans-serif" font-size="18" fill="#eef2ff">How the paths are distributed</text>
  <text x="610" y="336" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">A quick view of category balance and the strongest confidence signal.</text>
  <rect x="610" y="360" width="288" height="18" rx="9" fill="rgba(255,255,255,0.08)" />
  <rect x="610" y="360" width="224" height="18" rx="9" fill="url(#accent)" />
  <rect x="610" y="396" width="288" height="18" rx="9" fill="rgba(255,255,255,0.08)" />
  <rect x="610" y="396" width="176" height="18" rx="9" fill="url(#accent)" opacity="0.72" />
  <rect x="610" y="432" width="288" height="18" rx="9" fill="rgba(255,255,255,0.08)" />
  <rect x="610" y="432" width="132" height="18" rx="9" fill="url(#accent)" opacity="0.54" />
</svg>
