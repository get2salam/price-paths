<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Price Paths</title>
    <meta name="description" content="Sketch pricing experiments and compare which paths feel strongest." />
    <link rel="stylesheet" href="./styles/app.css" />
  </head>
  <body style="--primary:#fbbf24;--secondary:#fde68a;--panel:#1a1508;--edge:#5a4718;--glow:rgba(251, 191, 36, 0.22)">
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Local-first micro app</p>
          <h1>Price Paths</h1>
          <p class="lede">Sketch pricing experiments and compare which paths feel strongest.</p>
        </div>
        <div class="actions">
          <button class="btn" data-action="import">Import</button>
          <button class="btn" data-action="export">Export</button>
          <button class="btn btn-primary" data-action="new">New path</button>
          <input id="import-file" type="file" accept=".json,application/json" hidden />
        </div>
      </header>

      <section class="hero card">
        <div>
          <p class="eyebrow">Paths board</p>
          <h2 data-role="board-title"></h2>
          <p data-role="board-subtitle"></p>
        </div>
        <p class="accent">Pricing becomes easier when the tradeoffs are visible instead of emotional.</p>
      </section>

      <section class="stats" data-role="stats"></section>

      <section class="controls card">
        <label>
          <span>Search</span>
          <input type="search" data-field="search" placeholder="Search paths..." />
        </label>
        <label>
          <span>Path type</span>
          <select data-field="category"></select>
        </label>
        <label>
          <span>Status</span>
          <select data-field="status"></select>
        </label>
        <button class="btn" type="button" data-action="reset">Re-seed sample</button>
      </section>

      <section class="workspace">
        <article class="card list-panel">
          <div class="panel-head">
            <div>
              <strong>Paths</strong>
              <p>Sorted by signal minus friction.</p>
            </div>
            <span class="chip" data-role="count"></span>
          </div>
          <div class="list" data-role="list"></div>
        </article>
        <article class="card editor-panel" data-role="editor"></article>
      </section>
    </div>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
